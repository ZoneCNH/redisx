services:
  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  toolchain:
    build:
      context: .
      target: toolchain
      args:
        GO_VERSION: ${GO_VERSION:-1.23}
    working_dir: /workspace
    depends_on:
      redis:
        condition: service_healthy
    environment:
      GOWORK: ${GOWORK:-off}
      XLIB_CONTEXT: ${XLIB_CONTEXT:-docker_toolchain}
      VERSION: ${VERSION:-dev}
      DOWNSTREAM: ${DOWNSTREAM:-../kernel}
      XLIB_ENABLE_VULNCHECK: ${XLIB_ENABLE_VULNCHECK:-0}
      REDISX_REDIS_ADDR: ${REDISX_REDIS_ADDR:-redis:6379}
      REDISX_REDIS_URL: ${REDISX_REDIS_URL:-redis://redis:6379/0}
      REDISX_REDIS_DB: ${REDISX_REDIS_DB:-0}
    volumes:
      - .:/workspace
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod

volumes:
  redis-data:
  go-build-cache:
  go-mod-cache:
