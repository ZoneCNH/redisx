schema_version: "1.0"
name: redisx-metrics
metrics:
  - name: redisx_operations_total
    type: counter
    labels: [op]
  - name: redisx_operation_duration_seconds
    type: histogram
    labels: [op]
  - name: redisx_errors_total
    type: counter
    labels: [op, kind]
  - name: redisx_pool_connections
    type: gauge
    labels: [name, status]
  - name: redisx_health_status
    type: gauge
    labels: [name, status]
