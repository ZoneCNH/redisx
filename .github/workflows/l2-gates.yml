name: L2 Gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  l2-standards-shape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Check L2 manifest and evidence shape
        run: GOWORK=off make l2-check
      - name: Check L2 local contract snapshot
        run: GOWORK=off make test-contract
